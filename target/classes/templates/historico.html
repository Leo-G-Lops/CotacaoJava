<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="card">
        <h1>Histórico de Cotações</h1>

        <div th:each="c : ${lista}">
            <p>Produto: <span th:text="${c.produto}"></span></p>
            <p>Valor Final: <span th:text="${c.valorFinal}"></span></p>
            <p>Status: <span th:text="${c.status}"></span></p>
        </div>
    </div>
</body>
</html>
